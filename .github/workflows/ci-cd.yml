name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Build frontend
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5000

      # Build backend
      - name: Restore backend
        run: dotnet restore
        working-directory: backend/BessIntelligence.Api

      - name: Build backend
        run: dotnet build --no-restore --configuration Release
        working-directory: backend/BessIntelligence.Api

      # Start backend for E2E
      - name: Start backend
        run: |
          nohup dotnet run --configuration Release --no-build --no-launch-profile > backend.log 2>&1 &
          echo "Waiting for backend to start..."
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:5000/api/health > /dev/null 2>&1; then
              echo "Backend is up!"
              break
            fi
            echo "Attempt $i - backend not ready, waiting..."
            sleep 2
          done
          curl -f http://127.0.0.1:5000/api/health || (cat backend.log && exit 1)
        working-directory: backend/BessIntelligence.Api
        env:
          ASPNETCORE_URLS: http://0.0.0.0:5000
          ASPNETCORE_ENVIRONMENT: CI

      # Start frontend preview server for E2E
      - name: Start frontend
        run: |
          npx vite preview --port 5173 &
          sleep 3
        working-directory: frontend

      # Run E2E tests
      - name: Install E2E dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run Playwright tests
        run: npx playwright test --reporter=list
        working-directory: e2e

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  deploy:
    name: Deploy to Azure App Service
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Build React frontend for production
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ''  # Same-origin in production

      # Build .NET backend and copy frontend into wwwroot
      - name: Publish backend
        run: dotnet publish --configuration Release --runtime linux-x64 --self-contained false --output ./publish
        working-directory: backend/BessIntelligence.Api

      - name: Copy frontend build to wwwroot
        run: |
          mkdir -p backend/BessIntelligence.Api/publish/wwwroot
          cp -r frontend/dist/* backend/BessIntelligence.Api/publish/wwwroot/

      # Deploy to Azure App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend/BessIntelligence.Api/publish
