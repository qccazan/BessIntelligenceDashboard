name: CD — Deploy to Azure

on:
  push:
    branches: [main]

# Prevent concurrent deployments
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy to Azure App Service
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Build React frontend
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ''  # Same-origin in production (API + static served from one App Service)

      # Build .NET backend and copy frontend build into wwwroot
      - name: Publish backend
        run: dotnet publish --configuration Release --output ./publish
        working-directory: backend/BessIntelligence.Api

      - name: Copy frontend build to wwwroot
        run: |
          mkdir -p backend/BessIntelligence.Api/publish/wwwroot
          cp -r frontend/dist/* backend/BessIntelligence.Api/publish/wwwroot/

      # Deploy to Azure App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend/BessIntelligence.Api/publish
